<ion-app>
  <ion-menu contentId="main-content" side="start">
    <ion-header>
      <ion-toolbar>
        <ion-title>Menu</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content>
      <ion-list>
        <ion-item lines="none">
          <ion-label>
            <h2 id="menu-user-name">Usuário</h2>
          </ion-label>
        </ion-item>
        <ion-item button (click)="logout()" id="logout-btn">
          <ion-icon [icon]="logOutIcon" slot="start"></ion-icon>
          <ion-label>Sair da conta</ion-label>
        </ion-item>
      </ion-list>
    </ion-content>
  </ion-menu>
  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
