<ion-content>

  <div class="container">

    <div class="header">
      <h2>Cadastrar criança</h2>
      <p>Preencha os dados para adicionar a criança à caderneta de vacinação</p>
    </div>

    <div class="card">

      <ion-item fill="outline">
        <ion-label class="color-labels" position="floating">Nome completo</ion-label>
        <ion-input [(ngModel)]="nome"></ion-input>
      </ion-item>

      <ion-item fill="outline">
        <ion-label class="color-labels" position="floating">Idade</ion-label>
        <ion-input type="number" [(ngModel)]="idade"></ion-input>
      </ion-item>

      <ion-button expand="block" class="btn-salvar" (click)="salvar()">
        Salvar filho
      </ion-button>

    </div>

  </div>

</ion-content>
